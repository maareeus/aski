<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aski · Portale Clienti</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; background:#f8fafc; }
        #app .boot { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
        /* Note di rilascio (Markdown) */
        .prose-notes h1 { font-size:1.1rem; font-weight:700; margin:.6em 0 .3em; }
        .prose-notes h2 { font-size:1rem; font-weight:600; margin:.6em 0 .3em; }
        .prose-notes h3 { font-size:.95rem; font-weight:600; margin:.5em 0 .2em; }
        .prose-notes p { margin:.4em 0; }
        .prose-notes ul { list-style:disc; padding-left:1.4em; margin:.4em 0; }
        .prose-notes ol { list-style:decimal; padding-left:1.4em; margin:.4em 0; }
        .prose-notes code { background:#f1f5f9; padding:.1em .3em; border-radius:4px; font-size:.85em; }
        .prose-notes pre { background:#0f172a; color:#e2e8f0; padding:.8em; border-radius:8px; overflow-x:auto; margin:.5em 0; }
        .prose-notes pre code { background:transparent; padding:0; color:inherit; }
        .prose-notes a { color:#4f46e5; text-decoration:underline; }
        .prose-notes blockquote { border-left:3px solid #cbd5e1; padding-left:.8em; color:#64748b; margin:.5em 0; }
    </style>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Aski.Tickets.Portal.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot">
            <div style="display:flex;align-items:center;gap:10px;color:#475569;font-weight:600">
                <div style="width:34px;height:34px;border-radius:9px;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800">A</div>
                Caricamento…
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#fee2e2;color:#991b1b;padding:10px 16px;font-size:14px">
        Si è verificato un errore.
        <a href="." class="reload" style="text-decoration:underline">Ricarica</a>
        <span class="dismiss" style="float:right;cursor:pointer">🗙</span>
    </div>
    <script>
      window.downloadFile = (filename, contentType, base64) => {
        const a = document.createElement('a');
        a.href = `data:${contentType};base64,${base64}`;
        a.download = filename; document.body.appendChild(a); a.click(); a.remove();
      };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
